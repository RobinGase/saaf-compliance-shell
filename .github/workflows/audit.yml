name: Audit

on:
  push:
  pull_request:
  schedule:
    # Weekly re-scan so newly disclosed CVEs get caught even when the
    # lockfile hasn't changed. Mondays 06:00 UTC.
    - cron: '0 6 * * 1'

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: Scan pinned dependencies
        run: pip-audit -r requirements.lock --strict
