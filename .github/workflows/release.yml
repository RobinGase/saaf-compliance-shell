name: release

# S11 / v0.9.0-s11 — tagged-release pipeline.
#
# Fires on every ``v*`` tag push. Produces three artefacts on the
# GitHub release:
#
#   - saaf-compliance-shell-<sha>.tar.gz   — the reproducible source tarball
#     (scripts/make-release-tarball.sh; deterministic bytes per commit)
#   - saaf-compliance-shell-<sha>.spdx.json — SPDX 2.3 SBOM generated by
#     syft over the repository source tree
#   - saaf-compliance-shell-<sha>.tar.gz.sig + .tar.gz.crt — cosign
#     keyless signature + certificate, bound to the GitHub OIDC identity
#     of this workflow run (repo + ref + job + actor). No long-lived key
#     material exists; the Sigstore Fulcio root is the trust anchor.
#
# Verification flow lives in ``scripts/verify-release.sh`` and the
# README Verification section. Operators run that script against a
# downloaded release and cosign walks the Rekor transparency log to
# confirm the signature was made by this workflow on this tag.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write        # create release + upload assets
  id-token: write        # OIDC token for cosign keyless signing
  packages: read

jobs:
  build-sign-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for setuptools_scm + tag describe)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build reproducible release tarball
        id: build
        run: |
          set -euo pipefail
          scripts/make-release-tarball.sh
          TARBALL="$(ls dist/saaf-compliance-shell-*.tar.gz)"
          SHA="$(sha256sum "${TARBALL}" | awk '{print $1}')"
          echo "tarball=${TARBALL}" >> "${GITHUB_OUTPUT}"
          echo "sha256=${SHA}" >> "${GITHUB_OUTPUT}"
          echo "Tarball: ${TARBALL}"
          echo "sha256:  ${SHA}"

      - name: Generate SPDX SBOM via syft
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: ${{ steps.build.outputs.tarball }}.spdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: v2.2.4

      - name: Sign tarball (cosign keyless, GitHub OIDC)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          set -euo pipefail
          cosign sign-blob \
            --yes \
            --output-signature "${{ steps.build.outputs.tarball }}.sig" \
            --output-certificate "${{ steps.build.outputs.tarball }}.crt" \
            "${{ steps.build.outputs.tarball }}"

      - name: Sign SBOM (cosign keyless, GitHub OIDC)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          set -euo pipefail
          SBOM="${{ steps.build.outputs.tarball }}.spdx.json"
          cosign sign-blob \
            --yes \
            --output-signature "${SBOM}.sig" \
            --output-certificate "${SBOM}.crt" \
            "${SBOM}"

      - name: Emit release body with sha256 + verification snippet
        id: body
        run: |
          set -euo pipefail
          TARBALL="${{ steps.build.outputs.tarball }}"
          SHA="${{ steps.build.outputs.sha256 }}"
          TAG="${GITHUB_REF_NAME}"
          {
            echo "## saaf-compliance-shell ${TAG}"
            echo ""
            echo "**Tarball sha256:** \`${SHA}\`"
            echo ""
            echo "### Verify"
            echo ""
            echo "\`\`\`bash"
            echo "scripts/verify-release.sh \\"
            echo "  $(basename "${TARBALL}") \\"
            echo "  --tag ${TAG}"
            echo "\`\`\`"
            echo ""
            echo "Verifier walks the Sigstore Rekor transparency log and"
            echo "confirms the signature was issued by this repo's release"
            echo "workflow on tag \`${TAG}\`."
          } > release-body.md
          echo "path=release-body.md" >> "${GITHUB_OUTPUT}"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ steps.body.outputs.path }}
          files: |
            ${{ steps.build.outputs.tarball }}
            ${{ steps.build.outputs.tarball }}.sig
            ${{ steps.build.outputs.tarball }}.crt
            ${{ steps.build.outputs.tarball }}.spdx.json
            ${{ steps.build.outputs.tarball }}.spdx.json.sig
            ${{ steps.build.outputs.tarball }}.spdx.json.crt
