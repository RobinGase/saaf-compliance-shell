name: Test

on:
  push:
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install package and test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run non-Presidio test suite
        run: python -m pytest tests/ --ignore=tests/test_presidio_redact.py -q
