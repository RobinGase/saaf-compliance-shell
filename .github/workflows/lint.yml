name: Lint

on:
  push:
  pull_request:

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ruff
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Ruff check
        run: ruff check .

  mypy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install mypy + stubs
        # Keep this lean. Full dev install pulls spaCy/Presidio, which the
        # lint gate does not need — the type check covers `modules/` and `cli.py`
        # only, with `ignore_missing_imports = true` for the heavy deps.
        run: |
          python -m pip install --upgrade pip
          pip install mypy types-PyYAML

      - name: Mypy check
        run: mypy
