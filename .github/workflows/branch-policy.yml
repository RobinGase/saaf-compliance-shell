name: Branch Policy

on:
  push:
  pull_request:

jobs:
  portability:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Enforce modular branch portability
        env:
          BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
        run: python scripts/check_branch_portability.py --branch "$BRANCH_NAME" --root .
